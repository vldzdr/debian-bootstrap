;==========================================================
;
;   Polybar config with Debian colorscheme
;
;==========================================================

[colors]
; Debian-themed colors
background = #1a1a1a
background-alt = #2d2d2d
foreground = #e8e8e8
foreground-alt = #b0b0b0
primary = #D70A53
secondary = #4a4a4a
alert = #D70A53
disabled = #707070

[bar/main]
width = 100%
height = 35pt
radius = 0

; Position at top of screen
bottom = false

; Colors
background = ${colors.background}
foreground = ${colors.foreground}

; Borders
line-size = 3pt
border-size = 0pt
border-color = ${colors.secondary}

; Padding
padding-left = 1
padding-right = 1

; Module spacing
module-margin = 1

; Separator between modules
separator = |
separator-foreground = ${colors.secondary}

; Fonts
font-0 = monospace:size=12;2
font-1 = Font Awesome 6 Free:style=Solid:size=12;2
font-2 = Font Awesome 6 Brands:style=Regular:size=12;2

; Modules
modules-left = xworkspaces xwindow
modules-right = filesystem pulseaudio xkeyboard memory cpu wlan eth date

; System tray
tray-position = right
tray-padding = 2
tray-background = ${colors.background}

; Cursor actions
cursor-click = pointer
cursor-scroll = ns-resize

; Enable IPC
enable-ipc = true

; Window manager specific settings
wm-restack = i3
override-redirect = false

[module/systray]
type = internal/tray
tray-spacing = 8px

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1
label-occupied-foreground = ${colors.foreground-alt}

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%
label-foreground = ${colors.foreground-alt}

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#D70A53}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#D70A53}%ifname%%{F#707070} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#D70A53}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#D70A53}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini

